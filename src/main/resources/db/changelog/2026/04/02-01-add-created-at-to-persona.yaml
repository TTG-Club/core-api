databaseChangeLog:
  - changeSet:
      id: 2026-04-02-01-add-created-at-to-persona
      author: vitalii
      changes:
        - addColumn:
            tableName: persona
            columns:
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: now()
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: persona
            columnName: created_at
