databaseChangeLog:
  - changeSet:
      id: 2026-07-21-01-create-spellbook-table
      author: dev
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: spellbook
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_spellbook
                  name: id
                  type: UUID
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: owner_username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
              - column:
                  name: updated_at
                  type: DATETIME
              - column:
                  name: username
                  type: VARCHAR(255)
              - column:
                  name: last_username
                  type: VARCHAR(255)
        - createIndex:
            columns:
              - column:
                  name: owner_username
            indexName: spellbook_owner_username_index
            tableName: spellbook
