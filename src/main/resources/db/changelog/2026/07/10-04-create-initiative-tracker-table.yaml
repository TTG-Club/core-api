databaseChangeLog:
  - changeSet:
      id: 2026-07-10-04-create-initiative-tracker-table
      author: Peterko
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: initiative_tracker
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_initiative_tracker
                  name: id
                  type: UUID
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: owner_username
                  type: VARCHAR(255)
              - column:
                  name: access_key
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: round
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: current_participant_id
                  type: UUID
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
              - column:
                  name: updated_at
                  type: DATETIME
              - column:
                  name: username
                  type: VARCHAR(255)
              - column:
                  name: last_username
                  type: VARCHAR(255)
  - changeSet:
      id: 2026-07-10-04-create-initiative-tracker-index
      author: Peterko
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createIndex:
            columns:
              - column:
                  name: owner_username
            indexName: initiative_tracker_owner_username_index
            tableName: initiative_tracker
