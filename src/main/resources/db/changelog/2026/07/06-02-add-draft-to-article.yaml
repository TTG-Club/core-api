databaseChangeLog:
  - changeSet:
      id: 2026-07-06-03-add-draft-to-article
      author: Peterko
      changes:
        - addColumn:
            tableName: article
            columns:
              - column:
                  name: draft
                  type: BOOLEAN
                  defaultValueBoolean: false
        - update:
            tableName: article
            columns:
              - column:
                  name: draft
                  valueBoolean: false
            where: draft IS NULL
        - addNotNullConstraint:
            tableName: article
            columnName: draft
            columnDataType: BOOLEAN
            defaultNullValue: false
