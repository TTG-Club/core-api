databaseChangeLog:
  - changeSet:
      id: 18-01-create-vttg-export
      author: claude
      changes:
        - createTable:
            tableName: vttg_export
            remarks: "Предрассчитанный VTTG-payload сущностей (кэш экспорта /changes, /module)"
            columns:
              - column:
                  name: type
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: url
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: jsonb
                  constraints:
                    nullable: false
              - column:
                  name: src_updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: schema_ver
                  type: int
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: vttg_export
            columnNames: type, url
            constraintName: pk_vttg_export
