databaseChangeLog:
  - changeSet:
      id: 2026-06-19-01-drop-item-type-column
      author: Codex
      preConditions:
        - onFail: MARK_RAN
        - columnExists:
            tableName: item
            columnName: item_type
      changes:
        - dropColumn:
            tableName: item
            columnName: item_type

  - changeSet:
      id: 2026-06-19-01-add-item-category-column
      author: Codex
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: item
                columnName: category
      changes:
        - addColumn:
            tableName: item
            columns:
              - column:
                  name: category
                  type: VARCHAR(31)
                  defaultValue: ITEM

  - changeSet:
      id: 2026-06-19-01-backfill-item-category
      author: Codex
      preConditions:
        - onFail: MARK_RAN
        - columnExists:
            tableName: item
            columnName: category
      changes:
        - sql:
            sql: |
              update item
              set category = case
                  when weapon is not null and weapon <> '{}'::jsonb then 'WEAPON'
                  when armor is not null and armor <> '{}'::jsonb then 'ARMOR'
                  else 'ITEM'
              end
              where category is null;
