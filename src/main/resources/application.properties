spring.application.name=ttg.club
spring.main.banner-mode=off
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.url=${APP_URL}

# HTTP-сжатие ответов (большой JSON, напр. /api/v2/vttg/changes, жмётся в разы).
# ZIP-модули (octet-stream) не включены — они уже сжаты.
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=2048

auth-service.jwt-secret=${JWT_SECRET}

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Mail
spring.mail.host=smtp.mail.ru
spring.mail.port=465
spring.mail.username=support@ttg.club
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=true

# Swagger
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.displayRequestDuration=true

# Security
security.ignored-paths[0]=/v3/api-docs/**
security.ignored-paths[1]=/swagger-ui.html
security.ignored-paths[2]=/swagger-ui/**
security.ignored-paths[3]=/scalar-ui.html
security.ignored-paths[4]=/api/v2/**
security.ignored-paths[5]=/actuator/health

# Notifications
notification.advertising-weight=5
notification.advertising-interval-minutes=30
notification.view-retention-days=3

# Online service
online.service.url=${ONLINE_SERVICE_URL:http://localhost:8092}
online.service.api-token=${ONLINE_SERVICE_API_TOKEN:}
online.service.site-id=${ONLINE_SERVICE_SITE_ID:5e24}

# Subscriber service (подписки/коды вынесены в отдельный сервис)
subscriber-service.base-url=${SUBSCRIBER_API_URL:http://localhost:8093}

# Общий секрет межсервисных вызовов (внутренние ручки + клиент subscriber-service)
internal.service-secret=${INTERNAL_SERVICE_SECRET:}

# Telegram (автопубликация статей / новостей в канал). Секреты — из окружения:
# в Dokploy через переменные окружения сервиса, локально — в local.env.
# Интеграция включена, когда заданы bot-token и chat-id; иначе ничего не отправляется.
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}
telegram.api-url=${TELEGRAM_API_URL:https://api.telegram.org}
# Период опроса «пора постить» (ISO-8601 duration).
telegram.poll-interval=${TELEGRAM_POLL_INTERVAL:PT1M}

# Discord (автопубликация статей / новостей в канал через входящий вебхук). Секрет — из окружения:
# в Dokploy через переменную окружения сервиса, локально — в local.env.
# Интеграция включена, когда задан webhook-url; иначе ничего не отправляется.
discord.webhook-url=${DISCORD_WEBHOOK_URL:}
# Период опроса «пора постить» (ISO-8601 duration).
discord.poll-interval=${DISCORD_POLL_INTERVAL:PT1M}

# VK (автопубликация статей / новостей на стену сообщества через ключ доступа сообщества, без бота).
# Секреты — из окружения: в Dokploy через переменные окружения сервиса, локально — в local.env.
# Интеграция включена, когда заданы access-token и group-id; иначе ничего не отправляется.
vk.access-token=${VK_ACCESS_TOKEN:}
vk.group-id=${VK_GROUP_ID:}
vk.api-url=${VK_API_URL:https://api.vk.com/method}
vk.api-version=${VK_API_VERSION:5.199}
# Период опроса «пора постить» (ISO-8601 duration).
vk.poll-interval=${VK_POLL_INTERVAL:PT1M}

# Трекер инициативы (инструмент). Анонимные трекеры (без владельца) живут tracker.anonymous-ttl
# с последней активности и затем удаляются планировщиком (период — tracker.cleanup-interval).
# Создание анонимных трекеров ограничено tracker.anonymous-create-limit на IP
# за окно tracker.anonymous-create-window (ISO-8601 duration).
tracker.anonymous-create-limit=10
tracker.anonymous-create-window=PT1H
tracker.anonymous-ttl=P14D
tracker.cleanup-interval=PT1H

# JPA
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.hibernate.id.new_generator_mappings=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
logging.level.liquibase=ERROR
spring.liquibase.enabled=true
spring.jpa.defer-datasource-initialization=false

# S3 Cloud
spring.cloud.aws.s3.endpoint=${SPRING_CLOUD_AWS_S3_ENDPOINT}
spring.cloud.aws.s3.region=${SPRING_CLOUD_AWS_S3_REGION}
spring.cloud.aws.s3.bucket=${SPRING_CLOUD_AWS_S3_BUCKET}
spring.cloud.aws.credentials.access-key=${SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY}
