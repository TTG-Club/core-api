name: Deploy
run-name: Deploy by @${{ github.actor }}

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.REGISTRY_URL }}
  IMAGE_NAME: ${{ github.event.repository.name }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' || github.ref_name == 'dev' }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enabled=${{ github.ref_name == 'main' }}

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.ref_name }}
          cache-to: type=gha,mode=min,scope=${{ github.ref_name }}

      - uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  update:
    name: Update Server
    needs: build
    runs-on: ubuntu-latest
    # TODO: remove if block after tests
    if: ${{ github.event_name == 'workflow_dispatch' && (github.ref_name == 'main' || github.ref_name == 'dev') }}
    env:
      SERVICE_NAME: 5e24-${{ github.ref_name == 'main' && 'prod' || 'dev' }}-api
      CONFIG_FILE: ${{ secrets.BEGET_SSH_PATH }}/${{ github.ref_name == 'main' && 'prod' || 'dev' }}/5e24/compose.yaml
    steps:
      - uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BEGET_SSH_HOST }}
          username: ${{ secrets.BEGET_SSH_USER }}
          key: ${{ secrets.BEGET_SSH_KEY }}
          port: ${{ secrets.BEGET_SSH_PORT }}
          script: |
            echo "${{ secrets.ZOT_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.ZOT_USERNAME }}" --password-stdin
            
            docker compose -f ${{ env.CONFIG_FILE }} pull ${{ env.SERVICE_NAME }} && \
            docker compose -f ${{ env.CONFIG_FILE }} up ${{ env.SERVICE_NAME }} \
              --no-deps \
              --detach \
              --wait \
              --wait-timeout 60
            
            DANGLING=$(docker images --filter "dangling=true" -q --no-trunc)
            if [ -n "$DANGLING" ]; then
              docker rmi $DANGLING || true
            fi